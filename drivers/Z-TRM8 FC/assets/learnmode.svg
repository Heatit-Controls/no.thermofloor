<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 141.73 141.73">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <!-- White background -->
  <rect width="141.73" height="141.73" fill="#fff"/>

  <!-- SCREEN 1: Settings menu -->
  <rect x="6" y="4" width="129.73" height="34" rx="3" fill="#1c1c1c"/>
  <circle cx="16" cy="11" r="5.5" fill="#00aeef"/>
  <text x="16" y="14.2" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">1</text>
  <text x="26" y="14.5" font-size="6" fill="#ccc">Settings</text>
  <line x1="6" y1="18" x2="135.73" y2="18" stroke="#3a3a3a" stroke-width="0.6"/>
  <rect x="6" y="18.3" width="129.73" height="10" fill="#00aeef" opacity="0.22"/>
  <text x="12" y="26" font-size="6.2" fill="#fff" font-weight="bold">Connection</text>
  <text x="12" y="34" font-size="5.5" fill="#555">Display setting</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="70.865" y1="38" x2="70.865" y2="44" stroke="#00aeef" stroke-width="1.2"/>
  <polygon points="70.865,46 67,41 74.73,41" fill="#00aeef"/>

  <!-- SCREEN 2: Connection menu -->
  <rect x="6" y="46" width="129.73" height="34" rx="3" fill="#1c1c1c"/>
  <circle cx="16" cy="53" r="5.5" fill="#00aeef"/>
  <text x="16" y="56.2" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">2</text>
  <text x="26" y="56.5" font-size="6" fill="#ccc">Connection</text>
  <line x1="6" y1="60" x2="135.73" y2="60" stroke="#3a3a3a" stroke-width="0.6"/>
  <rect x="6" y="60.3" width="129.73" height="10" fill="#00aeef" opacity="0.22"/>
  <text x="12" y="68" font-size="6.2" fill="#fff" font-weight="bold">Start add/remove mode</text>
  <text x="12" y="76" font-size="5.5" fill="#555">Stop add/remove mode</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="70.865" y1="80" x2="70.865" y2="86" stroke="#00aeef" stroke-width="1.2"/>
  <polygon points="70.865,88 67,83 74.73,83" fill="#00aeef"/>

  <!-- SCREEN 3: Searching -->
  <rect x="6" y="88" width="129.73" height="49" rx="3" fill="#1c1c1c"/>
  <circle cx="16" cy="95" r="5.5" fill="#00aeef"/>
  <text x="16" y="98.2" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">3</text>
  <text x="26" y="98.5" font-size="6" fill="#ccc">Connection</text>
  <line x1="6" y1="102" x2="135.73" y2="102" stroke="#3a3a3a" stroke-width="0.6"/>
  <!-- Spinner dots -->
  <circle cx="46"     cy="121"   r="1.3" fill="#333"/>
  <circle cx="53.5"   cy="114.5" r="1.6" fill="#444"/>
  <circle cx="62"     cy="110.5" r="1.9" fill="#555"/>
  <circle cx="70.865" cy="109"   r="2.2" fill="#777"/>
  <circle cx="79.7"   cy="110.5" r="1.9" fill="#555"/>
  <circle cx="88.2"   cy="114.5" r="1.6" fill="#444"/>
  <circle cx="95.7"   cy="121"   r="1.3" fill="#333"/>
  <text x="70.865" y="132" text-anchor="middle" font-size="5.5" fill="#666">Searching... (up to 90s)</text>

</svg>
